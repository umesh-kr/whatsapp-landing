<!DOCTYPE html>
<html>
<head>
  <title>Question</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 30px;
      color: #333;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
      transition: all 0.3s ease;
    }

    #yesBtn {
      background-color: #ff4d6d;
      color: white;
    }

    #yesBtn:hover {
      background-color: #e63950;
    }

    #noBtn {
      background-color: #4CAF50;
      color: white;
      position: relative;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Are you still angry on me? 🥺</h2>
  <button id="yesBtn" onclick="goYes()">No</button>
  <button id="noBtn" onclick="goNo()">Yes</button>
</div>

<script>
function goYes() {
  window.location.href = "https://wa.me/1234567890";
}

let scale = 1;

function goNo() {
  const btn = document.getElementById("noBtn");

  scale *= 0.7;
  btn.style.transform = `scale(${scale})`;

  // Move randomly
  btn.style.position = "relative";
  btn.style.left = (Math.random() * 200 - 100) + "px";
  btn.style.top = (Math.random() * 200 - 100) + "px";
}
</script>

</body>
</html>
