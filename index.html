<!DOCTYPE html>
<html>
<head>
  <title>Question</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e6a19a;
      font-family: Arial, sans-serif;
    }

    .container {
      background: #eee;
      padding: 30px 20px;
      border-radius: 25px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 24px;
      color: #333;
    }

    .btn-area {
      position: relative;
      height: 200px;
    }

    button {
      position: absolute;
      padding: 14px 24px;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    /* Initial clean layout */
    #yesBtn {
      background: #ff4d6d;
      color: white;
      left: 25%;
      top: 40%;
      transform: translate(-50%, -50%);
    }

    #noBtn {
      background: #4CAF50;
      color: white;
      right: 25%;
      bottom: 20%;
      transform: translate(50%, 50%);
    }
  </style>
</head>
<body>

<div class="container">
  <h2 id="title">Are you still angry on me? 🥺</h2>

  <div class="btn-area" id="area">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>
</div>

<script>
let scale = 1;
let index = 0;

const messages = [
  "Are you still angry on me? 🥺",
  "Really? 😟",
  "Still?? 😭",
  "Okay this is getting serious 😶",
  "You’re not giving up huh 😤"
];

// sound fix (iPhone friendly)
const audio = new Audio("https://www.soundjay.com/human/sounds/aww-01.mp3");
let unlocked = false;

document.body.addEventListener("click", () => {
  if (!unlocked) {
    audio.play().then(() => {
      audio.pause();
      audio.currentTime = 0;
      unlocked = true;
    }).catch(()=>{});
  }
}, { once: true });

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const area = document.getElementById("area");
const title = document.getElementById("title");

yesBtn.onclick = moveYes;
noBtn.onclick = goNo;

function moveYes() {

  if (unlocked) {
    audio.currentTime = 0;
    audio.play();
  }

  if (navigator.vibrate) {
    navigator.vibrate(80);
  }

  scale *= 0.85;
  yesBtn.style.transform = `scale(${scale})`;

  const areaWidth = area.clientWidth;
  const areaHeight = area.clientHeight;

  let x = Math.random() * (areaWidth - 100);
  let y = Math.random() * (areaHeight - 60);

  // prevent going too close to No button zone
  const noRect = noBtn.getBoundingClientRect();

  let tries = 0;
  while (tries < 20) {
    let tempX = Math.random() * (areaWidth - 100);
    let tempY = Math.random() * (areaHeight - 60);

    yesBtn.style.left = tempX + "px";
    yesBtn.style.top = tempY + "px";

    const yesRect = yesBtn.getBoundingClientRect();

    const overlap = !(
      yesRect.right < noRect.left ||
      yesRect.left > noRect.right ||
      yesRect.bottom < noRect.top ||
      yesRect.top > noRect.bottom
    );

    if (!overlap) break;

    tries++;
  }

  index = (index + 1) % messages.length;
  title.innerText = messages[index];
}

function goNo() {
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Thank you 🙂</h2>";

  setTimeout(() => {
    window.open('', '_self');
    window.close();
  }, 2000);
}
</script>

</body>
</html>
